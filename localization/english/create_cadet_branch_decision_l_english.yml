l_english:
 # === Historical Cadet Branch Creation Decision ===
 create_historical_branch_decision:0 "Create Historical Cadet Branch"
 create_historical_branch_decision_desc:0 "Establish a cadet branch that mirrors a historically significant house. If you are of the Capetian dynasty and hold key titles, you may restore famous branches such as the House of Valois or House of Anjou."
 create_historical_branch_decision_tooltip:0 "Form a cadet branch tied to historical dynastic roots."
 create_historical_branch_decision_confirm:0 "Create Branch"
 
 create_historical_branch_decision_valid:0 "You are a member of a major royal dynasty with a historically linked title."
 
 # === Default Message Title ===
 created_historical_cadet_branch_toast_new_house_desc:0 "A New House is Born"
 
 # === CAPET ===
 created_cadet_branch_capet_toast_desc:0 "[Character.GetName] has founded the illustrious House Capet once more, reviving the ancestral core of the Capetian line!"
 global_variable_not_formed_house_capet_text:0 "The House of Capet has not been founded."
 global_variable_formed_house_capet_text:0 "The House of Capet has been founded."
 
